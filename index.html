<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BestellApp</title>
    <link rel="icon" type="image/x-icon" href="./assets/icons/logo.png" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/dialog.css">
    <link rel="stylesheet" href="./styles/media.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <script src="./scripts/data.js"></script>
    <script src="./scripts/templates.js"></script>
    <script src="./script.js" defer></script>
</head>


<body onload="init()">
    <header class="page_header">
        <img src="./assets/icons/header_logo.png" alt="BestellApp Logo">
        <img src="./assets/icons/placeholder_menu.png" alt="BurgerMenu Logo">
    </header>
    <section class="hero">
        <img src="./assets/icons/logo.png" alt="Burger Icon">
    </section>
    <section class="headline">
        <div class="headline_wrapper">
            <h1><span style="color: var(--orange);">Burger</span>House</h1>
            <div class="headline_rating">
                <img src="./assets/icons/star.png" alt="star icon">
                <p>4,8 (317)</p>
            </div>
        </div>
        <p>No compromises. Just pure and plant-powered flavor.</p>
    </section>


    <main>
        <section class="main_wrapper">
            <section class="menu_wrapper">
                <section class="main_burger">
                    <details open>
                        <summary class="menu_header">
                            <img class="menu_header_img" src="./assets/icons/burger_icon.png" alt="burger icon">
                            <h2>Burger</h2>
                            <img class="menu_header_icon" src="./assets/icons/arrow_down.png" alt="arrow">
                        </summary>
                        <article id="menu_burger" class="menu_card_wrapper">
                            <!-- <section class="menu_card">
                                <img src="./assets/img/burger_1.png" alt="Burger Image">
                                <div class="menu_text">
                                    <h3>Menü Platzhalter</h3>
                                    <p>Beschreibung Platzhalter</p>
                                </div>

                                <div class="menu_price">
                                    <p>00,00€</p>
                                    <button class="button_img"><img src="./assets/icons/button Add.png"alt="Add to Basket"></button>
                                </div>

                            </section> -->
                        </article>
                    </details>
                </section>

                <section class="main_pizza">
                    <details open>
                        <summary class="menu_header">
                            <img class="menu_header_img" src="./assets/icons/pizza_icon.png" alt="pizza icon">
                            <h2>Pizza</h2>
                            <img class="menu_header_icon" src="./assets/icons/arrow_down.png" alt="arrow">
                        </summary>
                        <article id="menu_pizza" class="menu_card_wrapper">
                        </article>
                    </details>
                </section>

                <section class="main_salad">
                    <details open>
                        <summary class="menu_header">
                            <img class="menu_header_img" src="./assets/icons/salad_icon.png" alt="salad icon">
                            <h2>Salad</h2>
                            <img class="menu_header_icon" src="./assets/icons/arrow_down.png" alt="arrow">
                        </summary>
                        <article id="menu_salad" class="menu_card_wrapper">
                        </article>
                    </details>
                </section>
            </section>

            <section class="basket_wrapper">
                <article class="basket">
                    <h3>Your Basket</h3>
                    <section id="basket" class="basket_section">

                        <!-- <section id="basket" class="basket_card_wrapper"></section> -->
                    </section>
                </article>
            </section>
        </section>

        <dialog id="basket_dialog">
            
        </dialog>

    </main>

    

    <footer class="page_footer">
        <img src="./assets/icons/copyright.png" alt="Copyright">
        <a href="imprint.html">Imprint</a>
        <a href="cookieprivacy.html">Cookie Preferences</a>
    </footer>

    <footer id="responsive_footer" class="responsive_footer">
    </footer>

</body>

</html>
