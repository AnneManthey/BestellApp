<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BestellApp</title>
    <link rel="icon" type="image/x-icon" href="./assets/icons/logo.png" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <script src="./scripts/data.js"></script>
    <script src="./scripts/templates.js"></script>
    <script src="./script.js" defer></script>
</head>


<body>
    <header class="page_header">
        <img src="./assets/icons/header_logo.png" alt="BestellApp Logo">
        <img src="./assets/icons/placeholder_menu.png" alt="BurgerMenu Logo">
    </header>
    <section class="hero">
        <img src="./assets/icons/logo.png" alt="Burger Icon">
    </section>
    <section class="headline">
        <div class="headline_wrapper">
            <h1>BurgerHouse</h1>
            <div class="headline_rating">
                <img src="./assets/icons/star.png" alt="star icon">
                <p>4,1 (317)</p>
            </div>
        </div>
        <p>The best of Burgers, Pizza, and Greens, all in one place.</p>
    </section>

    <main>
        <section class="main_wrapper">
            <section class="menu_wrapper">
                <section class="main_burger">
                    <details>
                        <summary class="menu_header">
                            <img class="menu_header_img" src="./assets/icons/burger_icon.png" alt="burger icon">
                            <h2>Burger & Sandwiches</h2>
                            <img class="menu_header_icon" src="./assets/icons/arrow_down.png" alt="arrow">
                        </summary>
                        <article>
                            <p>Template Platzhalter</p>
                        </article>
                    </details>
                </section>

                <section class="main_pizza">
                    <details>
                        <summary class="menu_header">
                            <img class="menu_header_img" src="./assets/icons/pizza_icon.png" alt="pizza icon">
                            <h2>Pizza (30cm)</h2>
                            <img class="menu_header_icon" src="./assets/icons/arrow_down.png" alt="arrow">
                        </summary>
                        <article>
                            <p>Template Platzhalter</p>
                        </article>
                    </details>
                </section>

                <section class="main_salad">
                    <details>
                        <summary class="menu_header">
                            <img class="menu_header_img" src="./assets/icons/salad_icon.png" alt="salad icon">
                            <h2>Salad</h2>
                            <img class="menu_header_icon" src="./assets/icons/arrow_down.png" alt="arrow">
                        </summary>
                        <article>
                            <p>Template Platzhalter</p>
                        </article>
                    </details>
                </section>
            </section>

            <section class="basket_wrapper">
                <div id="basket" class="basket">
                    <h3>Your Basket</h3>
                    <div class="basket_card">
                        <p></p>
                        <div>
                            <button>x</button>
                            <p>1</p>
                            <button>+</button>
                            <p>00,00€</p>
                        </div>
                    </div>
                    <table>
                        <tr>
                            <th>Subtotal</th>
                            <td>00,00€</td>
                        </tr>
                        <tr>
                            <th>Delivery fee</th>
                            <td>4,99€</td>
                        </tr>
                        <tr>
                            <th>Total</th>
                            <td>00,00€</td>
                        </tr>
                    </table>
                    <button>Buy now (00,00€)</button>
                </div>
            </section>
        </section>



    </main>


    <footer class="page_footer">
        <img src="./assets/icons/copyright.png" alt="Copyright">
        <a href="">Imprint</a>
        <a href="">Cookie Preferences</a>
    </footer>

</body>

</html>
